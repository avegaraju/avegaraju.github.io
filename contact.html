    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" />

  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
      <div class="container">
        <a class="navbar-brand" href="index.html">My code catalog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="work.html">Work</a></li>
            <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <h2>Contact Me</h2>
      <p>Do you have a question about my blog articles or want to discuss an exciting opportunity? Fill in the form below.</p>
      <div class="row">
        <div class="col-md-6">
          <ul class="list-unstyled">
            <li class="mb-2"><strong>Email:</strong> <a href="mailto:avegaraju@gmail.com">avegaraju@gmail.com</a></li>
            <li class="mb-2"><strong>Hours:</strong> Mon - Fri 09:00 – 18:00</li>
          </ul>
        </div>
      </div>
      <form action="https://getform.io/f/529027f9-c4ae-4d3e-8134-f5931ab8714e" method="POST" class="mt-4">
        <div class="mb-3">
          <label class="form-label" for="name">Name</label>
          <input type="text" class="form-control" id="name" name="name" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" name="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="message">Message</label>
          <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    </main>

    <footer class="mt-5">
      <div class="container text-center">
        <p class="mb-0">&copy; 2025 Ashish Vegaraju. All rights reserved.</p>
      </div>
